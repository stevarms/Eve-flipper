name: Download Badge

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-download-badge:
    name: Update Download Badge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Publish download badge
        env:
          GITHUB_TOKEN: ${{ secrets.BADGE_STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/publish-download-badge.sh
