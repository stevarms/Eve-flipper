name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    name: Build Web Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Embed Windows version info
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          MAJOR="${MAJOR:-1}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"

          cat > versioninfo_ci.json << EOF
          {
            "FixedFileInfo": {
              "FileVersion":    { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": 0 },
              "ProductVersion": { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": 0 },
              "FileFlagsMask": "3f", "FileFlags": "00",
              "FileOS": "040004", "FileType": "01", "FileSubType": "00"
            },
            "StringFileInfo": {
              "CompanyName":      "Eve Flipper Contributors",
              "FileDescription":  "EVE Online Market Trading Tool",
              "FileVersion":      "${BASE}",
              "InternalName":     "eve-flipper",
              "LegalCopyright":   "Copyright 2026 Eve Flipper Contributors",
              "OriginalFilename": "eve-flipper.exe",
              "ProductName":      "Eve Flipper",
              "ProductVersion":   "${BASE}"
            },
            "VarFileInfo": { "Translation": { "LangID": "0409", "CharsetID": "04B0" } },
            "IconPath":     "assets/logo_black.ico",
            "ManifestPath": "assets/app.manifest"
          }
          EOF

          $(go env GOPATH)/bin/goversioninfo -o resource_windows_amd64.syso versioninfo_ci.json

      - name: Cross-compile web binaries
        env:
          ESI_CLIENT_ID: ${{ secrets.ESI_CLIENT_ID }}
          ESI_CLIENT_SECRET: ${{ secrets.ESI_CLIENT_SECRET }}
          ESI_CALLBACK_URL: ${{ secrets.ESI_CALLBACK_URL }}
        run: |
          if [ -z "${ESI_CLIENT_ID}" ] || [ -z "${ESI_CLIENT_SECRET}" ] || [ -z "${ESI_CALLBACK_URL}" ]; then
            echo "ERROR: ESI_CLIENT_ID / ESI_CLIENT_SECRET / ESI_CALLBACK_URL GitHub Secrets must be set for release builds."
            exit 1
          fi

          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          if [ -n "${ESI_CLIENT_ID}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientID=${ESI_CLIENT_ID}"
          fi
          if [ -n "${ESI_CLIENT_SECRET}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientSecret=${ESI_CLIENT_SECRET}"
          fi
          if [ -n "${ESI_CALLBACK_URL}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESICallbackURL=${ESI_CALLBACK_URL}"
          fi

          for target in \
            "windows amd64 .exe" \
            "linux amd64 " \
            "linux arm64 " \
            "darwin amd64 " \
            "darwin arm64 "; do
            set -- $target
            echo "Building web $1/$2..."
            GOOS=$1 GOARCH=$2 CGO_ENABLED=0 \
              go build -ldflags "${LDFLAGS}" -o "eve-flipper-web-$1-$2$3" .
          done

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-binaries
          path: |
            eve-flipper-web-windows-amd64.exe
            eve-flipper-web-linux-amd64
            eve-flipper-web-linux-arm64
            eve-flipper-web-darwin-amd64
            eve-flipper-web-darwin-arm64
          if-no-files-found: error

  build-desktop:
    name: Build Desktop (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            cgo: "0"
            windows_gui: "1"
          - runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ""
            cgo: "1"
            windows_gui: "0"
          - runner: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
            ext: ""
            cgo: "1"
            windows_gui: "0"
          - runner: macos-14
            goos: darwin
            goarch: amd64
            ext: ""
            cgo: "1"
            windows_gui: "0"
          - runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
            cgo: "1"
            windows_gui: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Linux desktop dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libsoup2.4-dev

      - name: Build frontend for desktop
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:wails

      - name: Embed Windows version info
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

          VERSION="${GITHUB_REF_NAME#v}"
          BASE="${VERSION%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          MAJOR="${MAJOR:-1}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"

          cat > versioninfo_ci.json << EOF
          {
            "FixedFileInfo": {
              "FileVersion":    { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": 0 },
              "ProductVersion": { "Major": ${MAJOR}, "Minor": ${MINOR}, "Patch": ${PATCH}, "Build": 0 },
              "FileFlagsMask": "3f", "FileFlags": "00",
              "FileOS": "040004", "FileType": "01", "FileSubType": "00"
            },
            "StringFileInfo": {
              "CompanyName":      "Eve Flipper Contributors",
              "FileDescription":  "EVE Online Market Trading Tool",
              "FileVersion":      "${BASE}",
              "InternalName":     "eve-flipper",
              "LegalCopyright":   "Copyright 2026 Eve Flipper Contributors",
              "OriginalFilename": "eve-flipper-desktop.exe",
              "ProductName":      "Eve Flipper",
              "ProductVersion":   "${BASE}"
            },
            "VarFileInfo": { "Translation": { "LangID": "0409", "CharsetID": "04B0" } },
            "IconPath":     "assets/logo_black.ico",
            "ManifestPath": "assets/app.manifest"
          }
          EOF

          $(go env GOPATH)/bin/goversioninfo -o resource_windows_amd64.syso versioninfo_ci.json

      - name: Build desktop binary
        shell: bash
        env:
          ESI_CLIENT_ID: ${{ secrets.ESI_CLIENT_ID }}
          ESI_CLIENT_SECRET: ${{ secrets.ESI_CLIENT_SECRET }}
          ESI_CALLBACK_URL: ${{ secrets.ESI_CALLBACK_URL }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          if [ "${{ matrix.windows_gui }}" = "1" ]; then
            LDFLAGS="-s -w -H=windowsgui -X main.version=${VERSION}"
          fi

          if [ -n "${ESI_CLIENT_ID}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientID=${ESI_CLIENT_ID}"
          fi
          if [ -n "${ESI_CLIENT_SECRET}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientSecret=${ESI_CLIENT_SECRET}"
          fi
          if [ -n "${ESI_CALLBACK_URL}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESICallbackURL=${ESI_CALLBACK_URL}"
          fi

          OUT="eve-flipper-desktop-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          echo "Building desktop ${OUT}..."

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            export CGO_LDFLAGS="${CGO_LDFLAGS} -framework UniformTypeIdentifiers"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=${{ matrix.cgo }} \
            go build -tags "wails,production" -ldflags "${LDFLAGS}" -o "${OUT}" .

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: eve-flipper-desktop-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-web
      - build-desktop
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          set -euo pipefail
          mapfile -t binaries < <(find . -maxdepth 1 -type f -name 'eve-flipper-*' -printf '%f\n' | sort)
          if [ "${#binaries[@]}" -eq 0 ]; then
            echo "ERROR: no release binaries found for checksum generation."
            exit 1
          fi

          : > SHA256SUMS.txt
          for file in "${binaries[@]}"; do
            sha256sum "${file}" >> SHA256SUMS.txt
          done

          echo "Generated checksums:"
          cat SHA256SUMS.txt
          ls -lah

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/eve-flipper-*
            release-assets/SHA256SUMS.txt
          draft: ${{ contains(github.ref_name, '-rc') }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
